# 가격표 매트릭스 — core/quote/engine.py 가 이 형식을 1:1 로 읽는다. 보간 없음, 조회만.
#
# 가격 근거: 한국 온라인 인쇄(성심·애드피아 등) 2025~26년 공개가 근사치. 실계약가 아님(데모용).
# 모든 금액은 원(KRW), **부가세(VAT 10%) 별도 공급가**다. engine.py 가 VAT 를 계산해
# total(VAT 포함)을 만든다.
#
# 형식 규약 (engine.py 와 계약):
#   products.<product>.axes:
#     기본가 조회 축의 순서. prices 트리를 이 순서대로 내려간다.
#     마지막 축은 반드시 quantity 이고, 리프 값은 int(원, VAT 별도)다.
#     quantity 키는 int 로 쓴다 (yaml.safe_load 가 int 로 읽음).
#   products.<product>.prices:
#     axes 순서의 중첩 매핑. 예: axes=[size, material, sides, quantity] 이면
#     prices["A4"]["art_100"]["double"][1000] = 27000
#   products.<product>.addons:
#     후가공 가산액. addons.<slot>.<value> 가
#       - int 이면: 수량 무관 고정 가산액
#       - 매핑이면: quantity 키(기본가와 동일한 수량 구간) → 가산액
#     슬롯 값이 "none" 이거나 슬롯 자체가 없으면 가산 0 (engine 규칙).
#     여기 없는 값이 들어오면 추정하지 않고 missing 으로 반환된다.
#
# 사이즈 키는 core/products/catalog/*.yaml 의 size.choices 와 1:1 로 일치해야 한다.

currency: KRW
vat_rate: 0.1          # 부가세율. total = supply + round(supply * vat_rate)

products:

  # ── 스티커 (사각/원형/도무송) ─────────────────────────────
  # 용지: art_250(아트지 250g), art_300(아트지 300g), art_300_matte(무광 아트 300g),
  #       pvc_white(백색 PVC/방수)
  sticker:
    axes: [size, material, quantity]
    prices:
      "50x50":
        art_250:       {100: 8000,  300: 14000, 500: 18000, 1000: 26000, 3000: 60000}
        art_300:       {100: 9000,  300: 16000, 500: 21000, 1000: 30000, 3000: 70000}
        art_300_matte: {100: 10000, 300: 17500, 500: 23000, 1000: 33000, 3000: 76000}
        pvc_white:     {100: 13000, 300: 22000, 500: 29000, 1000: 42000, 3000: 96000}
      "70x70":
        art_250:       {100: 10000, 300: 18000, 500: 24000, 1000: 36000, 3000: 85000}
        art_300:       {100: 11500, 300: 21000, 500: 28000, 1000: 42000, 3000: 98000}
        art_300_matte: {100: 12500, 300: 22500, 500: 30000, 1000: 45000, 3000: 106000}
        pvc_white:     {100: 16000, 300: 29000, 500: 38000, 1000: 58000, 3000: 136000}
      "90x90":
        art_250:       {100: 13000, 300: 24000, 500: 33000, 1000: 51000, 3000: 122000}
        art_300:       {100: 15000, 300: 27500, 500: 38000, 1000: 59000, 3000: 141000}
        art_300_matte: {100: 16000, 300: 30000, 500: 41000, 1000: 64000, 3000: 154000}
        pvc_white:     {100: 20000, 300: 38500, 500: 53000, 1000: 82000, 3000: 197000}
      "100x100":
        art_250:       {100: 14000, 300: 26000, 500: 36000, 1000: 56000, 3000: 135000}
        art_300:       {100: 16000, 300: 30000, 500: 41000, 1000: 64000, 3000: 155000}
        art_300_matte: {100: 17500, 300: 32500, 500: 45000, 1000: 70000, 3000: 169000}
        pvc_white:     {100: 22000, 300: 42000, 500: 58000, 1000: 90000, 3000: 216000}
    addons:
      coating:
        matte: {100: 4000, 300: 7000, 500: 9000, 1000: 14000, 3000: 30000}
        gloss: {100: 4000, 300: 7000, 500: 9000, 1000: 14000, 3000: 30000}

  # ── 명함 (4도 인쇄) ──────────────────────────────────────
  # 용지: snow_250(스노우지 250g), art_230(아트지 230g), vannouveau_210(반누보 210g, 수입지)
