          double: {100: 11500, 500: 22000, 1000: 35000, 2000: 62000}
      "54x86":
        art_300:
          single: {100: 7200,  500: 13400, 1000: 20600, 2000: 36000}
          double: {100: 9200,  500: 17400, 1000: 26800, 2000: 47000}
        pearl_300:
          single: {100: 9200,  500: 17400, 1000: 27600, 2000: 49000}
          double: {100: 11800, 500: 22600, 1000: 36000, 2000: 63000}
    addons:
