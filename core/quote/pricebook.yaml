        mesh:         {1: 35000, 3: 91000, 5: 144000, 10: 262000}
        indoor_pet:   {1: 42000, 3: 109000, 5: 172000, 10: 315000}
    addons:
      # 후가공: 사이즈 무관 고정 가산액 (int 리프 = 수량 무관 고정)
      finishing:
        grommet: 2000   # 고리(아일렛)
        rope: 3000      # 로프
