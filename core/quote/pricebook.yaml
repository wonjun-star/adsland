          double: {500: 23000, 1000: 30000, 2000: 45000, 4000: 73000}
        art_150:
          single: {500: 23000, 1000: 30000, 2000: 44000, 4000: 73000}
          double: {500: 30000, 1000: 39000, 2000: 58000, 4000: 95000}
        snow_120:
          single: {500: 20000, 1000: 25000, 2000: 37000, 4000: 61000}
          double: {500: 25000, 1000: 33000, 2000: 49000, 4000: 80000}
      A4:
        art_100:
