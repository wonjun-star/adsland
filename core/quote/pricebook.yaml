          double: {100: 11000, 500: 19000, 1000: 29000, 2000: 51000}
        rendezvous_240:
          single: {100: 15000, 500: 30000, 1000: 52000, 2000: 96000}
          double: {100: 19000, 500: 38000, 1000: 66000, 2000: 122000}
      "148x210":
        snow_250:
          single: {100: 13000, 500: 24000, 1000: 36000, 2000: 64000}
          double: {100: 17000, 500: 32000, 1000: 48000, 2000: 85000}
        art_250:
          single: {100: 12000, 500: 22000, 1000: 33000, 2000: 58000}
          double: {100: 16000, 500: 29000, 1000: 44000, 2000: 78000}
        rendezvous_240:
          single: {100: 22000, 500: 45000, 1000: 78000, 2000: 145000}
          double: {100: 28000, 500: 57000, 1000: 99000, 2000: 184000}
    addons:
