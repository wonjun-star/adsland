          double: {500: 27000, 1000: 35000, 2000: 53000, 4000: 86000}
        art_150:
          single: {500: 27000, 1000: 35000, 2000: 52000, 4000: 86000}
          double: {500: 35000, 1000: 45000, 2000: 69000, 4000: 112000}
        snow_120:
          single: {500: 23000, 1000: 30000, 2000: 44000, 4000: 72000}
          double: {500: 30000, 1000: 38500, 2000: 58000, 4000: 94000}
    addons:
      coating:
        # 전단은 무광 라미네이팅만 취급 (gloss 요청 시 missing → 질문/에스컬레이션)
        matte: {500: 15000, 1000: 26000, 2000: 46000, 4000: 84000}

  # ── 포스터 (단면 4도) ────────────────────────────────────
  # 용지: art_150(아트지 150g), art_200(아트지 200g), snow_200(스노우지 200g)
  poster:
    axes: [size, material, quantity]
    prices:
      A3:
        art_150:  {10: 12000, 30: 21000, 50: 28000, 100: 38000, 300: 78000}
        art_200:  {10: 14000, 30: 24000, 50: 32000, 100: 44000, 300: 90000}
        snow_200: {10: 13500, 30: 23500, 50: 31000, 100: 42500, 300: 87000}
