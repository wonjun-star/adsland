        gloss: {100: 5000, 500: 10000, 1000: 16000, 2000: 28000}

  # ── 떡메모지 (단면, 무코팅 / 권 단위) ────────────────────
  # 용지: woodfree_100(모조지 100g), woodfree_80(모조지 80g)
  # 수량은 '권'(묶음, 보통 100매/권) 단위. 리프 = 1권 묶음 공급가.
  memopad:
    axes: [size, material, quantity]
    prices:
      "100x100":
