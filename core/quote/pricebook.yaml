    axes: [size, material, sides, quantity]
    prices:
      "90x50":
        snow_250:
          single: {200: 8000,  400: 11000, 1000: 19000, 2000: 33000}
          double: {200: 9500,  400: 13500, 1000: 23000, 2000: 40000}
        art_230:
          single: {200: 7000,  400: 9500,  1000: 16500, 2000: 28500}
          double: {200: 8500,  400: 12000, 1000: 20500, 2000: 35500}
        vannouveau_210:
          single: {200: 15000, 400: 24000, 1000: 48000, 2000: 88000}
          double: {200: 18000, 400: 29000, 1000: 57000, 2000: 105000}
      "86x54":
        snow_250:
          single: {200: 8500,  400: 12000, 1000: 20500, 2000: 35500}
          double: {200: 10000, 400: 14500, 1000: 25000, 2000: 43000}
        art_230:
          single: {200: 7500,  400: 10500, 1000: 18000, 2000: 31000}
