# 엣지 — 시안 생성이 불가한 상품(포스터)의 백지 고객: 사람 검판으로 넘긴다.
# (명함은 시안을 자동 생성하지만, 포스터·전단 등 자유 창작이 필요한 상품은 담당자에게)
id: e1_design_request_escalates
description: 포스터 시안을 새로 만들어 달라는 C유형. 포스터 자동 시안은 비목표라 사람에게 넘긴다.
steps:
  - user: "포스터 시안 좀 새로 만들어주세요. 디자인이 하나도 없어요."
expect:
  completed: false
  final_state: SLOT_FILLING
  max_questions: 8
  escalated: true
  escalation_contains: "customer_type_C"
