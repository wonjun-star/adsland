# 엣지 — C유형(파일 없음, 시안 제작 요청): 프로토타입 스코프 밖 → 즉시 에스컬레이션
id: e1_design_request_escalates
description: 시안을 새로 만들어 달라는 C유형 고객. 시안 생성은 비목표(§1.3)라 사람에게 넘긴다.
steps:
  - user: "명함 시안 좀 새로 만들어주세요. 디자인이 하나도 없어요."
expect:
  completed: false
  final_state: SLOT_FILLING
  max_questions: 3
  slots:
    material: snow_250
    coating: "none"
    sides: single    # 파일 없으면 기본값 단면 (파일이 오면 페이지 수로 추론)
  escalated: true
  escalation_contains: "customer_type_C"
